<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>控制板專案 — 客戶需求確認</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #0f172a 0%, #1e3a5f 45%, #2563eb 100%);
      color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .wrap { max-width: 420px; width: 100%; text-align: center; }
    h1 { font-size: 1.35rem; font-weight: 700; line-height: 1.35; margin-bottom: 8px; }
    p.sub { font-size: 0.9rem; opacity: 0.85; margin-bottom: 28px; line-height: 1.5; }
    .cards { display: flex; flex-direction: column; gap: 14px; }
    a.card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      padding: 20px 22px;
      text-align: left;
      transition: background 0.2s, transform 0.15s;
    }
    a.card:hover { background: rgba(255,255,255,0.18); transform: translateY(-2px); }
    a.card strong { display: block; font-size: 1.05rem; margin-bottom: 6px; }
    a.card span { font-size: 0.82rem; opacity: 0.88; line-height: 1.45; }
    .badge { display: inline-block; font-size: 0.7rem; font-weight: 600; padding: 3px 8px; border-radius: 6px; margin-bottom: 8px; }
    .badge.full { background: #dbeafe; color: #1e40af; }
    .badge.simple { background: #dcfce7; color: #166534; }
    .notice {
      margin-top: 28px;
      text-align: left;
      font-size: 0.78rem;
      line-height: 1.55;
      opacity: 0.92;
      padding: 14px 16px;
      border-radius: 10px;
      background: rgba(254, 243, 199, 0.12);
      border: 1px solid rgba(253, 224, 71, 0.35);
      color: #fef9c3;
    }
    .notice strong { display: block; font-size: 0.72rem; letter-spacing: 0.06em; margin-bottom: 8px; opacity: 0.95; }
    .notice p { margin-bottom: 10px; }
    .notice p:last-child { margin-bottom: 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>控制板專案 — 需求確認</h1>
    <p class="sub">請盡量填寫<strong style="opacity:1;font-weight:700">完整版</strong>；若貴司暫無工程師協助細填，可改填<strong style="opacity:1;font-weight:700">簡易版</strong>。</p>
    <div class="cards">
      <a class="card" href="./form-full.html">
        <span class="badge full">完整版</span>
        <strong>客戶端確認表單（完整版）</strong>
        <span>含較多技術與規格欄位，便於我們精準評估與報價。</span>
      </a>
      <a class="card" href="./form-simple.html">
        <span class="badge simple">簡易版</span>
        <strong>客戶端確認表單（簡易版）</strong>
        <span>步驟較少、填寫較快，適合先建立共識或補齊資訊前使用。</span>
      </a>
    </div>
    <div class="notice" role="note">
      <strong>說明（成品與報價）</strong>
      <p><strong>完整版：</strong>欄位填寫越完整，我們越能對應規格、風險與工時做具體評估，<strong>報價與交付範圍（成品定義）</strong>通常可一次說明得較明確。</p>
      <p><strong>簡易版：</strong>以可取得的概況為主，我們仍會給出方向與參考；若關鍵規格不足，<strong>報價可能為區間或附條件</strong>，成品細節須待補件或後續討論後再定案。</p>
    </div>
  </div>
</body>
</html>
